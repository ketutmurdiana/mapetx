<!DOCTYPE html>
<html>
<head>
    <title>Memverifikasi MapetX...</title>    <script>
        window.onload = function() {
            // 1. Ambil Query (?code=...) dan Hash (#access_token=...)
            const search = window.location.search;
            const hash = window.location.hash;
            
            // 2. Gabungkan semuanya untuk dikirim ke aplikasi
            // Contoh: mapetx://auth/callback?code=...#access_token=...
            const deepLink = "mapetx://auth/callback" + search + hash;

            // 3. Coba buka aplikasi
            window.location.href = deepLink;

            // 4. Backup: Jika aplikasi tidak terbuka dalam 2.5 detik, arahkan ke web utama
            setTimeout(function() {
                // Jika masih di halaman ini, berarti aplikasi gagal terbuka
                if (!document.hidden) {
                    window.location.href = "https://mapetx.vercel.app/verify-success"; 
                }
            }, 2500);
        }
    </script>
</head>
<body>
    <p>Sedang membuka aplikasi MapetX... Jika tidak terbuka, <a href="mapetx://auth/callback">Klik di sini</a></p>
</body>
</html>
